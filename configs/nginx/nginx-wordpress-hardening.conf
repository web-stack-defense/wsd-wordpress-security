# =============================================================================
# WordPress Hardened Nginx Server Block
#
# Repository: wsd-wordpress-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# This is a reference Nginx server block for a single-site WordPress install
# running on PHP-FPM. It is not a complete nginx.conf — it goes inside the
# http {} block, typically as a file in /etc/nginx/sites-available/ symlinked
# to /etc/nginx/sites-enabled/.
#
# Every directive is commented with the reason it exists. Apply this in a
# staging environment and verify the site renders correctly before deploying
# to production.
#
# Requirements:
#   - Nginx 1.22 or newer
#   - PHP-FPM 8.1 or newer listening on Unix socket
#   - Valid TLS certificate (Let's Encrypt or commercial)
#   - WordPress 6.x in document root
# =============================================================================


# -----------------------------------------------------------------------------
# 1. HTTP to HTTPS redirect
# -----------------------------------------------------------------------------
# Forces all plain HTTP traffic to HTTPS. No production WordPress site should
# accept admin or login traffic over plaintext HTTP. This block redirects
# everything to the HTTPS server block below.
# -----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Allow Let's Encrypt ACME challenge on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}


# -----------------------------------------------------------------------------
# 2. Main HTTPS server block
# -----------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com www.example.com;

    root /var/www/html;
    index index.php;

    # -------------------------------------------------------------------------
    # 2.1 TLS configuration
    # -------------------------------------------------------------------------
    # Modern TLS configuration. Adjust certificate paths to match your
    # environment. Use Mozilla's SSL Configuration Generator as a reference
    # for the cipher suite — values below align with the "intermediate"
    # profile, which is the right default for public WordPress sites.
    # -------------------------------------------------------------------------

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_session_timeout 1d;
    ssl_session_cache shared:WordPressSSL:50m;
    ssl_session_tickets off;

    # OCSP stapling.
    ssl_stapling on;
    ssl_stapling_verify on;

    # -------------------------------------------------------------------------
    # 2.2 Security headers
    # -------------------------------------------------------------------------
    # See the corresponding section in the Apache configuration for the
    # rationale behind each header. Notes specific to Nginx:
    #
    #   - "always" ensures headers are added even on error responses.
    #   - Strict-Transport-Security is commented out. Enable only after
    #     confirming HTTPS works correctly. Once browsers cache HSTS,
    #     plain HTTP is rejected for the duration of max-age.
    # -------------------------------------------------------------------------

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide the Nginx version in error responses and Server headers.
    server_tokens off;

    # -------------------------------------------------------------------------
    # 2.3 Request size and timeout limits
    # -------------------------------------------------------------------------
    # WordPress media uploads, plugin installs, and large content imports
    # require enough request size to function. Set this to the largest
    # upload your site legitimately needs and no higher. Allowing 1GB
    # uploads to a site that never handles files over 10MB is an attack
    # surface, not a feature.
    # -------------------------------------------------------------------------

    client_max_body_size 32M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # -------------------------------------------------------------------------
    # 2.4 Sensitive file blocking
    # -------------------------------------------------------------------------
    # Mirror of the Apache sensitive file rules. Block direct access to
    # WordPress configuration files, version disclosure files, debug logs,
    # and common deployment artifacts.
    # -------------------------------------------------------------------------

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt|debug\.log|\.htaccess|\.htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /\.(git|svn|hg|env) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # 2.5 Block PHP execution in uploads
    # -------------------------------------------------------------------------
    # See the Apache configuration for the full rationale. This is one of
    # the highest-value single hardening rules. PHP files in the uploads
    # directory should never execute as code.
    # -------------------------------------------------------------------------

    location ~* /wp-content/uploads/.*\.(php|phtml|php3|php4|php5|php7|phps|phar)$ {
        deny all;
    }

    # Same protection for the plugins directory — if an attacker drops a
    # PHP file outside the plugin's expected entry points, block it.
    location ~* /wp-content/plugins/.*\.(php|phtml|php3|php4|php5|php7|phps|phar)$ {
        # Comment this out if you have plugins that legitimately load PHP
        # files from non-standard plugin paths. Most plugins do not.
        # deny all;
    }

    # -------------------------------------------------------------------------
    # 2.6 Author enumeration blocking
    # -------------------------------------------------------------------------
    # See the Apache configuration for context. Block requests that try to
    # enumerate usernames through the ?author=N pattern.
    # -------------------------------------------------------------------------

    if ($args ~* "author=\d") {
        return 403;
    }

    # -------------------------------------------------------------------------
    # 2.7 XML-RPC restriction
    # -------------------------------------------------------------------------
    # See the Apache configuration for the broader discussion. The block
    # below is commented out. Enable it only if you do not use Jetpack,
    # the WordPress mobile apps, or other XML-RPC clients.
    # -------------------------------------------------------------------------

    # location = /xmlrpc.php {
    #     deny all;
    #     access_log off;
    #     log_not_found off;
    # }

    # -------------------------------------------------------------------------
    # 2.8 wp-login.php rate limiting
    # -------------------------------------------------------------------------
    # Rate limiting on /wp-login.php blunts brute force attempts at the
    # server level, before they reach PHP. The limit_req_zone directive
    # below must be declared in the http {} context in nginx.conf:
    #
    #   limit_req_zone $binary_remote_addr zone=wp_login:10m rate=5r/m;
    #
    # With that in place, the location block below allows 5 login
    # requests per minute per IP, with a burst of 3.
    # -------------------------------------------------------------------------

    location = /wp-login.php {
        limit_req zone=wp_login burst=3 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    # -------------------------------------------------------------------------
    # 2.9 Static asset caching
    # -------------------------------------------------------------------------
    # Long cache lifetimes for static assets. WordPress files include cache
    # busters in URLs, so this is safe. Reducing load on PHP-FPM is also a
    # mild availability protection — a site that serves static assets from
    # cache is less likely to fall over under traffic.
    # -------------------------------------------------------------------------

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # 2.10 Default location and PHP handling
    # -------------------------------------------------------------------------
    # Standard WordPress permalink handling. Try the file directly, then
    # try as a directory, then fall through to index.php with query
    # arguments preserved.
    # -------------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param HTTP_PROXY "";
        fastcgi_intercept_errors on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # -------------------------------------------------------------------------
    # 2.11 Logging
    # -------------------------------------------------------------------------
    # Standard access and error logs. Adjust paths to your environment.
    # Log rotation should be handled by logrotate or equivalent.
    # -------------------------------------------------------------------------

    access_log /var/log/nginx/example.com.access.log;
    error_log  /var/log/nginx/example.com.error.log warn;
}
