# =============================================================================
# WordPress Hardened .htaccess Configuration
#
# Repository: wsd-wordpress-security
# Maintained as part of Web Stack Defense — https://www.webstackdefense.com
#
# This file replaces the default WordPress .htaccess file. It includes:
#
#   - The standard WordPress rewrite block (required for permalinks)
#   - File and directory protection rules
#   - Sensitive file blocking
#   - Directory listing prevention
#   - PHP execution restrictions in uploads
#   - Author enumeration blocking
#   - XML-RPC restriction (commented — read before enabling)
#   - Hotlink protection (commented)
#   - Security headers
#
# Every block is commented with the reason it exists. Apply one block at a
# time, test, and proceed only if the site continues to function.
#
# Requirements:
#   - Apache 2.4 with mod_rewrite, mod_headers, and AllowOverride All
#   - WordPress 6.x in document root
#   - Standard wp-content directory location
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Directory listing prevention
# -----------------------------------------------------------------------------
# Disables Apache's default behavior of listing directory contents when no
# index file is present. Without this, an attacker browsing to /wp-includes/
# or /wp-content/uploads/2024/01/ can enumerate the full file list.
#
# This is one of the highest-value, lowest-risk hardening directives. There
# is no scenario where a public WordPress site should expose directory
# listings.
# -----------------------------------------------------------------------------

Options -Indexes


# -----------------------------------------------------------------------------
# 2. Server signature suppression
# -----------------------------------------------------------------------------
# Removes the Apache version banner from error pages. This is reconnaissance
# hygiene, not a serious control. An attacker can fingerprint Apache through
# other means, but there is no reason to advertise the version on every
# error response.
# -----------------------------------------------------------------------------

ServerSignature Off


# -----------------------------------------------------------------------------
# 3. Sensitive file blocking
# -----------------------------------------------------------------------------
# These files contain credentials, debug information, configuration data, or
# version information that should never be served to a visitor.
#
#   wp-config.php       — Database credentials and auth keys
#   .htaccess           — This file (do not leak rules)
#   .htpasswd           — Basic auth passwords
#   readme.html         — Reveals exact WordPress version
#   license.txt         — Reveals WordPress installation
#   wp-config-sample.php — Reveals WordPress version structure
#   xmlrpc.php          — See section 7 for the broader XML-RPC discussion
#   debug.log           — Debug output (if WP_DEBUG_LOG is enabled)
#   .env, .git, .svn    — Common deployment artifacts
# -----------------------------------------------------------------------------

<FilesMatch "^(wp-config\.php|wp-config-sample\.php|\.htaccess|\.htpasswd|readme\.html|license\.txt|debug\.log)$">
    Require all denied
</FilesMatch>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# Block access to common deployment and source control artifacts.
<DirectoryMatch "^.*(\.git|\.svn|\.hg|\.env).*$">
    Require all denied
</DirectoryMatch>


# -----------------------------------------------------------------------------
# 4. Block PHP execution in uploads
# -----------------------------------------------------------------------------
# The wp-content/uploads/ directory holds user-uploaded media. It should
# never execute PHP. If an attacker manages to upload a PHP file (through a
# vulnerable plugin, a misconfigured upload field, or a compromised admin
# account), preventing PHP execution stops that file from running as code.
#
# This rule is one of the most effective single hardening steps available.
# It does not break legitimate WordPress functionality because WordPress
# does not execute PHP from uploads under normal conditions.
#
# Place this rule in a .htaccess file inside wp-content/uploads/ rather
# than in the root .htaccess if your hosting allows. The block below works
# from the root with mod_rewrite.
# -----------------------------------------------------------------------------

<Directory "/var/www/html/wp-content/uploads">
    <FilesMatch "\.(php|phtml|php3|php4|php5|php7|phps|phar)$">
        Require all denied
    </FilesMatch>
</Directory>


# -----------------------------------------------------------------------------
# 5. Block direct access to PHP files in wp-includes
# -----------------------------------------------------------------------------
# wp-includes/ contains internal WordPress core files. Most of them should
# never be requested directly by a browser. The rules below block direct
# access to PHP files in wp-includes except for the small number that
# WordPress legitimately serves directly.
# -----------------------------------------------------------------------------

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /

    # Block direct access to wp-includes files except those that must be reachable.
    RewriteRule ^wp-admin/includes/ - [F,L]
    RewriteRule !^wp-includes/ - [S=3]
    RewriteRule ^wp-includes/[^/]+\.php$ - [F,L]
    RewriteRule ^wp-includes/js/tinymce/langs/.+\.php$ - [F,L]
    RewriteRule ^wp-includes/theme-compat/ - [F,L]
</IfModule>


# -----------------------------------------------------------------------------
# 6. Author enumeration blocking
# -----------------------------------------------------------------------------
# WordPress exposes author archives at /?author=1, /?author=2, and so on.
# By default, requesting /?author=1 returns a redirect to /author/{username}/,
# which reveals the username of user ID 1 (often an admin account).
#
# This rule blocks any request containing the author= parameter at the URL
# level, preventing the username disclosure.
#
# Note: this also blocks legitimate author archive pages accessed by
# permalink (e.g. /author/jane/). If your site uses author archives as a
# public feature, do not enable this rule.
# -----------------------------------------------------------------------------

<IfModule mod_rewrite.c>
    RewriteCond %{QUERY_STRING} (^|&)author=([0-9]*) [NC]
    RewriteRule .* - [F,L]
</IfModule>


# -----------------------------------------------------------------------------
# 7. XML-RPC restriction
# -----------------------------------------------------------------------------
# xmlrpc.php is the legacy WordPress remote API. It is required for:
#
#   - Jetpack and related Automattic features
#   - The official WordPress mobile apps
#   - Some pingback and trackback functionality
#   - Some third-party publishing tools
#
# It is also a common brute force target. Attackers use xmlrpc.php to
# bypass rate limiting on /wp-login.php and to amplify brute force attempts
# through the system.multicall method.
#
# The block below is commented out by default. Enable it ONLY if you do
# not use Jetpack, the WordPress mobile apps, or any other XML-RPC client.
#
# An alternative is to restrict XML-RPC access to specific IP addresses
# using a Require ip directive.
# -----------------------------------------------------------------------------

# <Files xmlrpc.php>
#     Require all denied
# </Files>


# -----------------------------------------------------------------------------
# 8. Restrict access to wp-login.php (commented — read before enabling)
# -----------------------------------------------------------------------------
# If your site has a small, known set of admin users, you can restrict
# wp-login.php access to specific IP addresses. This is the most effective
# defense against brute force login attempts.
#
# Replace 203.0.113.0/24 with your actual admin source range.
#
# Do NOT enable this without confirming your admin IPs first. Locking
# yourself out of wp-login.php is recoverable but inconvenient.
# -----------------------------------------------------------------------------

# <Files wp-login.php>
#     Require ip 203.0.113.0/24
# </Files>


# -----------------------------------------------------------------------------
# 9. Block suspicious request patterns
# -----------------------------------------------------------------------------
# These rules block requests that contain common SQL injection, XSS, and
# file inclusion patterns in query strings. They are not a substitute for
# a real WAF, but they reduce noise from automated scanners.
# -----------------------------------------------------------------------------

<IfModule mod_rewrite.c>
    RewriteCond %{QUERY_STRING} \.\./\.\. [NC,OR]
    RewriteCond %{QUERY_STRING} (boot\.ini|etc/passwd|self/environ) [NC,OR]
    RewriteCond %{QUERY_STRING} (<|%3C).*script.*(>|%3E) [NC,OR]
    RewriteCond %{QUERY_STRING} (concat|union|select|insert|delete|update|drop|cast).*from.*information_schema [NC,OR]
    RewriteCond %{QUERY_STRING} base64_(en|de)code\(.*\) [NC]
    RewriteRule .* - [F,L]
</IfModule>


# -----------------------------------------------------------------------------
# 10. Security headers
# -----------------------------------------------------------------------------
# These headers reduce the impact of common client-side attacks. They do
# not stop the attacks from being attempted, but they limit what an
# attacker can achieve once XSS, clickjacking, or content sniffing is in
# play.
#
# Header notes:
#
#   X-Content-Type-Options    — Prevents MIME sniffing.
#   X-Frame-Options           — Blocks clickjacking via iframe embedding.
#   Referrer-Policy           — Limits Referer header information leakage.
#   Permissions-Policy        — Restricts powerful browser APIs.
#   Strict-Transport-Security — Enforces HTTPS for one year. ENABLE ONLY
#                               after confirming HTTPS works correctly. Once
#                               browsers cache HSTS, plain HTTP is rejected.
#
# Content-Security-Policy is intentionally NOT included here because a
# meaningful CSP requires per-site tuning. A wrong CSP breaks the site.
# -----------------------------------------------------------------------------

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"

    # Enable ONLY after confirming HTTPS works correctly across the site.
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Remove server identification headers where possible.
    Header unset X-Powered-By
    Header unset Server
</IfModule>


# -----------------------------------------------------------------------------
# 11. Standard WordPress rewrite block — DO NOT MOVE
# -----------------------------------------------------------------------------
# This is the default WordPress permalink rewrite. WordPress will rewrite
# this section if dashboard users save their permalink settings. Keep the
# BEGIN and END comment markers intact so WordPress recognizes the block
# and does not duplicate it.
# -----------------------------------------------------------------------------

# BEGIN WordPress
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteRule ^index\.php$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /index.php [L]
</IfModule>
# END WordPress
